# Self-contained OpenAI-compatible mock LLM: a stdlib-only Python server in a
# ConfigMap — no custom images to build or pull beyond python:3.12-alpine.
apiVersion: v1
kind: ConfigMap
metadata:
  name: mockllm-script
  namespace: default
data:
  server.py: |
    import json, random, time
    from http.server import BaseHTTPRequestHandler, ThreadingHTTPServer

    LOREM = ("The gateway hums quietly between agents, counting tokens as they "
             "stream past. Mock completions are cheap, plentiful, and always "
             "on message. ").split()

    class Handler(BaseHTTPRequestHandler):
        def log_message(self, *args):
            print("%s %s" % (self.command, self.path), flush=True)

        def _json(self, code, body):
            data = json.dumps(body).encode()
            self.send_response(code)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", str(len(data)))
            self.end_headers()
            self.wfile.write(data)

        def do_GET(self):
            if self.path.startswith("/echo") or self.path == "/healthz":
                self._json(200, {"ok": True, "path": self.path})
            else:
                self._json(404, {"error": "not found"})

        def do_POST(self):
            length = int(self.headers.get("Content-Length", 0))
            raw = self.rfile.read(length) if length else b"{}"
            try:
                req = json.loads(raw)
            except Exception:
                req = {}
            if "/chat/completions" not in self.path:
                self._json(404, {"error": "not found"})
                return
            model = req.get("model", "mock-model")
            # Latency + token variety make the Usage charts interesting.
            time.sleep(random.uniform(0.05, 0.4))
            prompt_tokens = random.randint(150, 1200)
            completion_tokens = random.randint(40, 700)
            words = random.randint(12, 40)
            text = " ".join(random.choice(LOREM) for _ in range(words))
            self._json(200, {
                "id": "chatcmpl-mock",
                "object": "chat.completion",
                "created": int(time.time()),
                "model": model,
                "choices": [{
                    "index": 0,
                    "message": {"role": "assistant", "content": text},
                    "finish_reason": "stop",
                }],
                "usage": {
                    "prompt_tokens": prompt_tokens,
                    "completion_tokens": completion_tokens,
                    "total_tokens": prompt_tokens + completion_tokens,
                },
            })

    ThreadingHTTPServer(("0.0.0.0", 9234), Handler).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mockllm
  namespace: default
  labels: { app: mockllm }
spec:
  replicas: 1
  selector:
    matchLabels: { app: mockllm }
  template:
    metadata:
      labels: { app: mockllm }
    spec:
      containers:
        - name: mockllm
          image: python:3.12-alpine
          command: ["python", "/app/server.py"]
          ports:
            - containerPort: 9234
          volumeMounts:
            - name: script
              mountPath: /app
          readinessProbe:
            httpGet: { path: /healthz, port: 9234 }
            initialDelaySeconds: 2
      volumes:
        - name: script
          configMap: { name: mockllm-script }
---
apiVersion: v1
kind: Service
metadata:
  name: mockllm
  namespace: default
spec:
  selector: { app: mockllm }
  ports:
    - port: 9234
      targetPort: 9234
